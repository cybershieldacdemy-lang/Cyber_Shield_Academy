apiVersion: apps/v1
kind: Deployment
metadata:
  name: cybershield-web
  namespace: cybershield
  labels:
    app: cybershield
    component: web
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: cybershield
      component: web
  template:
    metadata:
      labels:
        app: cybershield
        component: web
    spec:
      containers:
        - name: cybershield
          image: cybershield-academy:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cybershield-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cybershield-secrets
                  key: jwt-secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: cybershield-secrets
                  key: jwt-refresh-secret
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cybershield-secrets
                  key: gemini-api-key
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: cybershield-secrets
                  key: stripe-secret-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /app/prisma/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cybershield-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: cybershield-web
  namespace: cybershield
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
  selector:
    app: cybershield
    component: web
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cybershield-ingress
  namespace: cybershield
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  tls:
    - hosts:
        - cybershield.academy
      secretName: cybershield-tls
  rules:
    - host: cybershield.academy
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cybershield-web
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cybershield-hpa
  namespace: cybershield
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cybershield-web
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cybershield-data-pvc
  namespace: cybershield
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: v1
kind: Namespace
metadata:
  name: cybershield
  labels:
    app: cybershield
